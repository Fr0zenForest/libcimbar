name: win7-send

on:
  workflow_dispatch:

jobs:
  build-win7-send:
    runs-on: windows-2022
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_CACHE_RELEASE_TAG: vcpkg-cache-win7
      VCPKG_CACHE_ASSET: vcpkg-win7-static-release-${{ hashFiles('.github/vcpkg-win7-deps.txt', 'vcpkg-triplets/x64-windows-static-release.cmake') }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Cache vcpkg binaries and downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg-bincache
            ${{ env.VCPKG_ROOT }}\downloads
          key: ${{ runner.os }}-vcpkg-win7-send-${{ hashFiles('.github/workflows/win7-send.yml', '.github/vcpkg-win7-deps.txt', 'vcpkg-triplets/x64-windows-static-release.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-win7-send-

      - name: Restore vcpkg cache from Release
        id: restore_release_cache
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cacheDir = "$env:GITHUB_WORKSPACE\vcpkg-bincache"
          New-Item -ItemType Directory -Path $cacheDir -Force | Out-Null
          $assetPath = Join-Path $env:RUNNER_TEMP $env:VCPKG_CACHE_ASSET
          $hit = "false"

          gh release view $env:VCPKG_CACHE_RELEASE_TAG -R $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release download $env:VCPKG_CACHE_RELEASE_TAG -R $env:GITHUB_REPOSITORY -p $env:VCPKG_CACHE_ASSET -D $env:RUNNER_TEMP *> $null
            if ($LASTEXITCODE -eq 0) {
              Expand-Archive -Path $assetPath -DestinationPath $cacheDir -Force
              $hit = "true"
            }
          }
          "release_cache_hit=$hit" >> $env:GITHUB_OUTPUT

      - name: Install OpenCV and GLFW (static, release-only)
        shell: pwsh
        run: |
          $cacheDir = "$env:GITHUB_WORKSPACE\vcpkg-bincache"
          New-Item -ItemType Directory -Path $cacheDir -Force | Out-Null
          $env:VCPKG_BINARY_SOURCES = "clear;files,$cacheDir,readwrite"
          Write-Host "release cache hit: ${{ steps.restore_release_cache.outputs.release_cache_hit }}"

          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --overlay-triplets="$env:GITHUB_WORKSPACE\vcpkg-triplets" `
            "opencv4:x64-windows-static-release" `
            "glfw3:x64-windows-static-release" `
            "glew:x64-windows-static-release" `
            --clean-after-build

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_OVERLAY_TRIPLETS="$env:GITHUB_WORKSPACE\vcpkg-triplets" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-release `
            -DBUILD_DESKTOP_TOOLS=ON `
            -DDISABLE_TESTS=ON `
            -DWIN7_COMPAT=ON `
            -DSTATIC_MSVC_RUNTIME=ON

      - name: Build cimbar_send
        shell: pwsh
        run: |
          cmake --build build --config Release --target cimbar_send

      - name: Package cimbar_send
        shell: pwsh
        run: |
          $sendExe = Get-ChildItem "$PWD\build" -Recurse -Filter cimbar_send.exe | Select-Object -First 1
          if (-not $sendExe) { throw "cimbar_send.exe not found" }

          $outDir = "$PWD\dist\win7-x64-send"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Copy-Item $sendExe.FullName "$outDir\cimbar_send.exe" -Force

          Get-FileHash "$outDir\cimbar_send.exe" -Algorithm SHA256 | Format-List

          Compress-Archive -Path "$outDir\*" -DestinationPath "$PWD\dist\cimbar-send-win7-x64-static.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cimbar-send-win7-x64-static
          path: dist/cimbar-send-win7-x64-static.zip
