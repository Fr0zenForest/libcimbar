name: win7-static

on:
  workflow_dispatch:

jobs:
  build-win7-static:
    runs-on: windows-2022
    timeout-minutes: 240
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Install OpenCV (static)
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install 'opencv4:x64-windows-static' --clean-after-build

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DBUILD_DESKTOP_TOOLS=OFF `
            -DDISABLE_TESTS=ON `
            -DWIN7_COMPAT=ON `
            -DSTATIC_MSVC_RUNTIME=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --target cimbar cimbar_extract

      - name: Install and package
        shell: pwsh
        run: |
          cmake --install build --config Release --prefix "$PWD\dist\win7-x64-static"

          $binDir = "$PWD\dist\win7-x64-static\bin"
          if (!(Test-Path "$binDir\cimbar.exe")) { throw "cimbar.exe not found in $binDir" }
          if (!(Test-Path "$binDir\cimbar_extract.exe")) { throw "cimbar_extract.exe not found in $binDir" }

          Get-FileHash "$binDir\cimbar.exe" -Algorithm SHA256 | Format-List
          Get-FileHash "$binDir\cimbar_extract.exe" -Algorithm SHA256 | Format-List

          Compress-Archive -Path "$binDir\*" -DestinationPath "$PWD\dist\cimbar-win7-x64-static.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cimbar-win7-x64-static
          path: dist/cimbar-win7-x64-static.zip
